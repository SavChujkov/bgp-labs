
interface Loopback0
 ip address 100.0.0.3 255.255.255.248
!
interface FastEthernet0/0
 ip address 10.0.10.10 255.255.255.252
 speed 100
 full-duplex
!
interface FastEthernet0/1
 ip address 10.0.10.2 255.255.255.252
 speed 100
 full-duplex
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router ospf 1
 log-adjacency-changes
 network 10.0.0.0 0.255.255.255 area 0
 network 100.0.0.0 0.0.0.7 area 0
!
router bgp 300
 no synchronization
 bgp log-neighbor-changes
 neighbor 100.0.0.1 remote-as 300
 neighbor 100.0.0.1 update-source Loopback0
 neighbor 100.0.0.1 next-hop-self
 neighbor 100.0.0.2 remote-as 300
 neighbor 100.0.0.2 update-source Loopback0
 neighbor 100.0.0.2 next-hop-self
 no auto-summary
!
