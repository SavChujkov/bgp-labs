interface Loopback0
 ip address 100.0.0.1 255.255.255.248
!
interface FastEthernet0/0
 ip address 10.0.240.253 255.255.255.252
 speed 100
 full-duplex
!
interface FastEthernet0/1
 ip address 10.0.10.9 255.255.255.252
 speed 100
 full-duplex
!
interface FastEthernet1/0
 ip address 10.0.20.1 255.255.255.252
 speed 100
 full-duplex
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router ospf 1
 log-adjacency-changes
 passive-interface FastEthernet1/0
 network 10.0.0.0 0.255.255.255 area 0
 network 100.0.0.0 0.0.0.255 area 0
!
router bgp 300
 no synchronization
 bgp log-neighbor-changes
 network 100.0.0.0 mask 255.255.255.248
 neighbor AS300-RR peer-group
 neighbor AS300-RR remote-as 300
 neighbor AS300-RR update-source Loopback0
 neighbor AS300-RR route-reflector-client
 neighbor AS300-RR next-hop-self
 neighbor 10.0.10.10 peer-group AS300-RR
 neighbor 10.0.20.2 remote-as 1500
 neighbor 10.0.240.254 remote-as 300
 no auto-summary