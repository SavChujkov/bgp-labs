###Исходные основные настройки маршрутизации
###На примере AS-1

    #AS-1
    interface Loopback0
    ip address 10.1.1.1 255.255.255.252
    ip ospf network point-to-point
    
    interface FastEthernet0/0
    ip address 192.168.30.1 255.255.255.0
    duplex auto
    speed auto
    !
    interface FastEthernet0/1
    ip address 192.168.10.1 255.255.255.0
    duplex auto
    speed auto

    router ospf 1
    log-adjacency-changes
    network 10.1.1.0 0.0.0.3 area 0
    network 192.168.10.0 0.0.0.255 area 0

    router bgp 1
    no synchronization
    bgp log-neighbor-changes
    network 10.1.1.0 mask 255.255.255.252
    network 10.2.2.0 mask 255.255.255.252 backdoor
    neighbor 192.168.30.3 remote-as 3

#(AS-1)Делаем маршрут 10.2.2.0/30 через bgp через AS-3 менее приоритетным
    #network backdoor делает пришедший анонс о сети 10.2.2.0/30 менее приоритетным чем из OSPF
    router bgp 1
    network 10.2.2.0 mask 255.255.255.252 backdoor

#(AS-2)Делаем маршрут 10.1.1.0/30 через bgp через AS-3 менее приоритетным
    #network backdoor делает пришедший анонс о сети 10.1.1.0/30 менее приоритетным чем из OSPF
    router bgp 2
    network 10.1.1.0 mask 255.255.255.252 backdoor