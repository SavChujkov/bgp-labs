    #show ip bgp, проверяем что as-path prepend сработал для 192.168.13.0 - да сработал
        Network          Next Hop            Metric LocPrf Weight Path
        r> 192.168.11.0     192.168.12.6                           0 300 100 i
        *> 192.168.12.0     0.0.0.0                  0         32768 i
        *  192.168.13.0     192.168.11.1                           0 100 100 300 i
        *>                  192.168.12.6             0             0 300 i

    #трейсим с source-addr-есом 192.168. до доступных адресов сети 192.168.13.0/24
    #идет через ISP-2 как теперь мы и хотим
