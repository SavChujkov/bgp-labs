#Исходные настройки
    #доступность соседей BGP по линк сетям
    #настройка анонса по EBGP сетей указанных на рисунке

#(1)Ухудшение приоритетности маршрута 192.168.13.0/24 на маршрутизаторе Company-1 через ISP-1

###выполняем настройки на Company маршрутизаторе
    #будем делать ухудшение анонса через ISP-1 через route-map

    #префикс-лист который будет определять для анонса какой сети будет применяться политика
    ip prefix-list LOW_PRIOR_NET seq 5 permit 192.168.13.0/24

    #делаем route-map,
    # для всех кто подошел (permit 10) по условиям match (LOW_PRIOR_NET)
    # выполняем добавление доп. номера as в as-path анонса
    route-map AS_PATH_PREPEND_ISP-1 permit 10
    match ip address prefix-list LOW_PRIOR_NET
    set as-path prepend 100

    #настройка для процесса bgp
    #для соседства с ISP-1 задаем route-map увеличивающий as-path
    #теперь route-map работает для всех входящих анонсов от ISP-1
    router bgp 200
    neighbor 192.168.11.1 route-map AS_PATH_PREPEND_ISP-1 in


###Проверка работы

