frr version 9.0
frr defaults traditional
hostname R1
log syslog informational

service integrated-vtysh-config

interface lo
 ip address 195.12.255.1/32

interface eth1
 ip address 10.0.20.1/30

interface eth2
 ip address 10.0.10.6/30


router bgp 100
  no bgp ebgp-requires-policy
  network 195.12.255.1/32
  network 195.12.255.2/32

  neighbor 10.0.10.5 remote-as 300
  neighbor 10.0.20.2 remote-as 100

  neighbor 10.0.10.5 activate
  neighbor 10.0.20.2 activate
