frr version 9.0
frr defaults traditional
hostname R4
log syslog informational

service integrated-vtysh-config


interface lo
 ip address 100.0.0.1/32

interface eth1
 ip address 10.0.10.1/30

interface eth2
 ip address 10.0.10.14/30


router bgp 200
  no bgp ebgp-requires-policy
  
  network 100.0.0.0/24

  neighbor 10.0.10.2 remote-as 100
  neighbor 10.0.10.13 remote-as 400


ip route 100.0.0.0/24 Null0