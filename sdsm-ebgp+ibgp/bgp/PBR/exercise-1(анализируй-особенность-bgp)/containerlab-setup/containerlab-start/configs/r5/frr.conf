frr version 9.0
frr defaults traditional
hostname R5
log syslog informational

service integrated-vtysh-config


interface lo
 ip address 180.0.0.1/32

interface eth1
 ip address 10.0.10.9/30

interface eth2
 ip address 10.0.10.13/30


router bgp 400
  no bgp ebgp-requires-policy
  network 180.0.0.0/24

  neighbor 10.0.10.10 remote-as 300
  neighbor 10.0.10.14 remote-as 200


ip route 180.0.0.0/24 Null0