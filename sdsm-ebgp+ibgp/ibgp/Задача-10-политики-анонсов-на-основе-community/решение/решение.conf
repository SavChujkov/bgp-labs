###Часть 2 - удалить локальные community (500:200) в анонсах к другим AS
###          изнутри AS-500. При этом остальные comm-string должны передаваться

###Настройка на 3750 AS-500
    #К соседу AS-100 делаем route-map на out, удаляющий 500:200 
        ip community-list standard PRIVATE_COMMUNITIES permit 500:200

        route-map DELETE_PRIVATE_POLICIES permit 10
        set comm-list PRIVATE_COMMUNITIES delete
    #Добавляем директиву чтобы все остальные community передавались
        neighbor 10.0.240.253 send-community

###Настройка на R2-500 AS-500
    #К соседу AS-100 делаем route-map на out, удаляющий 500:200 
        ip community-list standard PRIVATE_COMMUNITIES permit 500:200

        route-map DELETE_PRIVATE_POLICIES permit 10
        set comm-list PRIVATE_COMMUNITIES delete
    #Добавляем директиву чтобы все остальные community передавались
        neighbor 10.0.10.1 send-community

