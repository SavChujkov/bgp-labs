
###исходные данные
    #построенный ebgp с сосдеями из AS-500
    #постороенная связность внутри as-500
    #построенный ibgp внутри AS 500

###решение


###Настройки на R3 AS-1000

    #делаем селектор выбирающий анонсы сети 105.54.22.0/30
        ip prefix-list 10 seq 5 permit 105.54.22.0/30
    #создаем route-map добавляющий к анонсам 105.54.22.0/30 community 500:200
    #этот комьюнити будет сигналом для применения политики в AS-500 к этому анонсу
        route-map LP permit 10
         match ip address prefix-list 10
         set community 500:200

###Настройки на 3750 AS-500

#на AS-500 3750 маршрутизаторе
#необходимо для as-1000 r3 соседа 
#  удалить все community strings кроме тех которые используются для политик
#  установить политики для community-string о которых был договор с as-1000

#делаем селекторы для community-string для будушего route-map
    #селектор чтобы выбрать для каких community будем применять политику внутри as-500
        ip community-list 1 permit 500:200

    #селектор чтобы удалить все прочие community кроме наших (500:200)
        ip community-list standard TEST_DELETE deny 500:200
        ip community-list standard TEST_DELETE permit internet

    #создаем route-map 
    #  удаляющий мусорные community 
    #  и устанавливающий политики если пришел нужный community
    #  в данном случае устанавливает local-preference 200
        route-map DELETE_CLI_GARBAGE_COMMUNITY permit 10
        match community 1
        set comm-list TEST_DELETE delete
        set local-preference 200

    #применяем route-map к входящим анонсам соседа
        neighbor 10.0.10.1 route-map DELETE_CLI_GARBAGE_COMMUNITY

