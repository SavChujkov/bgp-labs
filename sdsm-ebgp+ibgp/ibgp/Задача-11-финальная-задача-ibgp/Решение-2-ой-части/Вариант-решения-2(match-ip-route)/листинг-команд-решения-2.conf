
##указано только для R1
##для R2 настройка будет зеркальной, просто смотрим на эти настройки и схему и переносим все аналогично


###проверочный ip sla до сервиса

ip sla 3
 icmp-echo 50.1.1.1 source-ip 101.0.0.2
 threshold 100
 frequency 10
ip sla schedule 3 life forever start-time now
ip sla 4
 icmp-echo 50.1.2.1 source-ip 101.0.0.2
 threshold 100
 frequency 10
ip sla schedule 4 life forever start-time now
ip sla 5
 icmp-echo 50.1.3.1 source-ip 101.0.0.2
 threshold 100
 frequency 10
ip sla schedule 5 life forever start-time now

track 3 rtr 3
delay up 10 down 15

track 4 rtr 4
delay up 10 down 15

track 5 rtr 5
delay up 10 down 15

track 6 list boolean or
object 3 not 

track 7 list boolean or
object 4 not 

track 8 list boolean or
object 5 not 


###создание условного принятия анонсов

ip route 172.255.255.203 255.255.255.255 Null 0 track 3
ip route 172.255.255.204 255.255.255.255 Null 0 track 4
ip route 172.255.255.205 255.255.255.255 Null 0 track 5

ip route 172.255.255.206 255.255.255.255 Null 0 track 6
ip route 172.255.255.207 255.255.255.255 Null 0 track 7
ip route 172.255.255.208 255.255.255.255 Null 0 track 8


router bgp 64500 
  network 172.255.255.203 mask 255.255.255.255
  network 172.255.255.204 mask 255.255.255.255
  network 172.255.255.205 mask 255.255.255.255
  network 172.255.255.206 mask 255.255.255.255
  network 172.255.255.207 mask 255.255.255.255
  network 172.255.255.208 mask 255.255.255.255
 
 
ip access-list standard CLIENT_FILIAL_1_NETS
 permit 50.1.1.0 0.0.0.255
ip access-list standard CLIENT_FILIAL_2_NETS
 permit 50.1.2.0 0.0.0.255
ip access-list standard CLIENT_FILIAL_3_NETS
 permit 50.1.3.0 0.0.0.255
 

ip access-list standard EXIST_MAP_FILIAL_1
 permit 172.255.255.203
ip access-list standard EXIST_MAP_FILIAL_2
 permit 172.255.255.204
ip access-list standard EXIST_MAP_FILIAL_3
 permit 172.255.255.205
 
ip access-list standard NON_EXIST_MAP_FILIAL_1
 permit 172.255.255.203
ip access-list standard NON_EXIST_MAP_FILIAL_2
 permit 172.255.255.204
ip access-list standard NON_EXIST_MAP_FILIAL_3
 permit 172.255.255.205
 
 
##to ISP-1
route-map INCOM-ANN-ISP-1 permit 10
  match ip route-source EXIST_MAP_FILIAL_1
  match ip address CLIENT_FILIAL_1_NETS
  set local-preference 200
route-map INCOM-ANN-ISP-1 permit 15

route-map INCOM-ANN-ISP-1 permit 20
  match ip route-source EXIST_MAP_FILIAL_2
  match ip address CLIENT_FILIAL_2_NETS
  set local-preference 200
route-map INCOM-ANN-ISP-1 permit 25

route-map INCOM-ANN-ISP-1 permit 30
  match ip route-source EXIST_MAP_FILIAL_3
  match ip address CLIENT_FILIAL_3_NETS
  set local-preference 200
route-map INCOM-ANN-ISP-1 permit 35


route-map INCOM-ANN-ISP-1 permit 40
  match ip route-source NON_EXIST_MAP_FILIAL_1
  match ip address CLIENT_FILIAL_1_NETS
  set local-preference 100
route-map INCOM-ANN-ISP-1 permit 45

route-map INCOM-ANN-ISP-1 permit 50
  match ip route-source NON_EXIST_MAP_FILIAL_2
  match ip address CLIENT_FILIAL_2_NETS
  set local-preference 100
route-map INCOM-ANN-ISP-1 permit 55

route-map INCOM-ANN-ISP-1 permit 60
  match ip route-source NON_EXIST_MAP_FILIAL_3
  match ip address CLIENT_FILIAL_3_NETS
  set local-preference 100
route-map INCOM-ANN-ISP-1 permit 65






